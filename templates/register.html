{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">💚</div>
      <h1>Create Account</h1>
      <p>Join MindCare AI — your mental health matters</p>
    </div>
    <form method="POST" class="auth-form" id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name"
               required autocomplete="name"/>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@university.edu"
               required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters"
               required autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               placeholder="Repeat your password" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account →</button>
    </form>
    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
  </div>
</div>
{% endblock %}
